version: "3.9"

services:
  smartpaper:
    build: .
    image: smartpaper-tagging:latest
    container_name: smartpaper
    ports:
      - "8550:8550"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CROSSREF_EMAIL=${CROSSREF_EMAIL:-}
    volumes:
      # 資料庫與向量儲存永久保存
      - ./data:/app/data
      # .env 直接掛載（可選，已透過 environment 傳入）
      # - ./.env:/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8550"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
